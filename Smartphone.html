<!-- SMARTPHONES PAGE -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CK TechFix - Smartphone Brands</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f7fb;
}

.header{
    background:#003B95;
    color:white;
    text-align:center;
    padding:30px 20px;
}

.header h1{
    font-size:2rem;
}

.header p{
    margin-top:10px;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

.brand-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}

.brand-card{
    background:white;
    border-radius:20px;
    text-decoration:none;
    color:#222;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
    transition:.3s;
}

.brand-card:hover{
    transform:translateY(-10px);
    box-shadow:0 10px 30px rgba(0,59,149,.2);
}

.brand-card img{
    width:100%;
    height:180px;
    object-fit:contain;
    padding:20px;
}

.brand-name{
    text-align:center;
    padding:20px;
    font-size:1.2rem;
    font-weight:700;
}

.footer{
    background:#002C70;
    color:white;
    text-align:center;
    padding:30px;
    margin-top:50px;
}

@media(max-width:768px){

.brand-grid{
    grid-template-columns:repeat(2,1fr);
}

.brand-card img{
    height:120px;
}

}

</style>
</head>

<body>

<div class="header">
    <h1>📱 Select Smartphone Brand</h1>
    <p>Choose your device manufacturer</p>
</div>

<div class="container">

<div class="brand-grid">

<!-- Samsung -->
<a href="samsung.html" class="brand-card">
    <img src="images/samsung.png">
    <div class="brand-name">Samsung</div>
</a>

<!-- Apple -->
<a href="iphone.html" class="brand-card">
    <img src="images/apple.png">
    <div class="brand-name">iPhone</div>
</a>

<!-- Pixel -->
<a href="google-pixel.html" class="brand-card">
    <img src="images/google-pixel.png">
    <div class="brand-name">Google Pixel</div>
</a>

<!-- Tecno -->
<a href="tecno.html" class="brand-card">
    <img src="images/tecno.png">
    <div class="brand-name">Tecno</div>
</a>

<!-- Infinix -->
<a href="infinix.html" class="brand-card">
    <img src="images/infinix.png">
    <div class="brand-name">Infinix</div>
</a>

<!-- itel -->
<a href="itel.html" class="brand-card">
    <img src="images/itel.png">
    <div class="brand-name">itel</div>
</a>

<!-- Huawei -->
<a href="huawei.html" class="brand-card">
    <img src="images/huawei.png">
    <div class="brand-name">Huawei</div>
</a>

<!-- Oppo -->
<a href="oppo.html" class="brand-card">
    <img src="images/oppo.png">
    <div class="brand-name">Oppo</div>
</a>

</div>

</div>

<div class="footer">
    <h3>CK TechFix</h3>
    <p>Your Doorstep Mobile Repairing GURU</p>
    <p>📍 Lusaka, Zambia</p>
</div>

</body>
  </html>
